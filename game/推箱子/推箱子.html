<!doctype html>
<html>

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>琅琊王朝的推箱子</title>
	<style>
		* {
			margin: 0px;
			padding: 0px;
		}

		body {
			overflow: hidden;
		}

		.game {
			width: 560px;
			margin: 50px auto;
		}
	</style>
</head>

<body onkeydown="doKeyDown(event)">
	<div class="game">
		<canvas id="canvas" width="560" height="560"></canvas>
		<div id="msg"></div>
		<input type="button" value="上一关" onclick="NextLevel(-1)">
		<input type="button" value="下一关" onclick="NextLevel(1)">
		<input type="button" value="我要重玩" onclick="NextLevel(0)">
		<input type="button" value="游戏说明" onclick="showHelp()">
	</div>
</body>
<script src="js/mapDataHundred.js"></script>
<script src="js/change.js"></script>

</html>
