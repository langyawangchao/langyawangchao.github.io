<!doctype html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>琅琊王朝的扫雷游戏</title>
    <script src="js/jquery.js"></script>
    <link rel="stylesheet" href="css/change.css">
</head>
<body>
<header class="site-header" role="banner">
    <div class="wrap">
        <h1>扫雷</h1>
        <h2>手机无敌！注意方框里的细细红线,有这个就说明这个方框是雷！</h2>
        <p>↑电↑脑↑上↑没↑有↑</p>
        <p>↑↑技↑术↑↑原↑因↑↑</p>
        <div class="legend">
            <h4>操作（电脑版,手机版可以将雷保留，全场只剩雷没翻开也能赢。）</h4>
            <p><strong>插旗子:</strong> <code><span class="key">alt</span>+<span class="click">click</span></code></p>
            <p><strong>清除周围格子:</strong> <code><span class="key">shift</span>+<span
                    class="click">click</span></code></p>
        </div>
    </div>
</header>
<main class="site-main" role="main">
    <div class="wrap">
        <div id="board">
            <div class="top">
                <div id="scoreboard">
                    <div id="minecounter" class="counter"></div>
                    <div>
                        <div class="select-wrap">
                            <select name="level" id="level">
                                <option value="beginner">初学者</option>
                                <option value="intermediate">进阶</option>
                                <option value="expert" selected>大师</option>
                            </select>
                        </div>
                        <button class="reset">^_^</button>
                    </div>
                    <div id="timer" class="counter"></div>
                </div>
                <div id="grid"></div>
            </div>
            <div class="bottom"></div>
        </div>
    </div>
</main>

<script src="js/change.js"></script>
</body>
</html>
